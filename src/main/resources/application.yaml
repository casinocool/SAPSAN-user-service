server:
  port: 8082
  servlet:
    context-path: /api
  forward-headers-strategy: framework
  tomcat:
    max-swallow-size: 500MB
    max-http-form-post-size: 500MB

spring:
  application:
    name: user-service
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  datasource:
    url: jdbc:postgresql://localhost:5434/user
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://sapsan.local/realms/sapsan
          jwk-set-uri: http://localhost:8080/realms/sapsan/protocol/openid-connect/certs

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: password
  region: us-east-1
  bucket: lectures


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    # Спринг сам подставит /api (context-path), поэтому здесь пишем только относительный путь
    config-url: /api/v3/api-docs/swagger-config
    url: /api/v3/api-docs
  server:
    # Общий путь для всех API монолита через Nginx
    url: https://sapsan.local/api

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO



