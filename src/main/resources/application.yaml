server:
  port: 8082
  forward-headers-strategy: framework

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5434/user
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    instance:
      prefer-ip-address: true

springdoc:
  swagger-ui:
    config-url: /api/users/v3/api-docs/swagger-config
    url: /api/users/v3/api-docs
  api-docs:
    path: /v3/api-docs
  server:
    url: https://sapsan.local/api/users

logging:
  level:
    org.flywaydb: DEBUG



